<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!-- Glowing Background Shield -->
  <circle cx="32" cy="32" r="28" fill="#140a24" stroke="#ffd700" stroke-width="2.5" />
  
  <!-- Red Torii Gate -->
  <!-- Top roof beam -->
  <path d="M16 24 C22 21.5, 42 21.5, 48 24" stroke="#e11d48" stroke-width="4.5" stroke-linecap="round" />
  <path d="M14 20 C24 17.5, 40 17.5, 50 20" stroke="#e11d48" stroke-width="2.5" stroke-linecap="round" />
  <!-- Tie beam -->
  <path d="M20 28.5 H44" stroke="#e11d48" stroke-width="2.5" />
  <!-- Pillars -->
  <path d="M23.5 22 L21.5 45" stroke="#e11d48" stroke-width="3.5" stroke-linecap="round" />
  <path d="M40.5 22 L42.5 45" stroke="#e11d48" stroke-width="3.5" stroke-linecap="round" />
